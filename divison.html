<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Division Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .calculator {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      width: 320px;
      text-align: center;
    }

    .calculator h1 {
      margin-bottom: 20px;
      color: #333;
      font-size: 24px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      width: 95%;
      padding: 12px;
      margin-top: 15px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .result-box {
      margin-top: 20px;
      padding: 15px;
      background: #f1f3f5;
      border-radius: 8px;
    }

    .expression {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .result {
      font-size: 22px;
      font-weight: bold;
      color: #222;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <h1>Division Calculator</h1>

    <input type="number" id="num1" placeholder="Enter first number" />
    <input type="number" id="num2" placeholder="Enter second number" />

    <button onclick="divideNumbers()">Divide</button>

    <div class="result-box">
      <div class="expression" id="expression">Enter numbers to divide</div>
      <div class="result" id="result">0</div>
    </div>
  </div>

  <script>
    function divideNumbers() {
      const num1 = parseFloat(document.getElementById("num1").value);
      const num2 = parseFloat(document.getElementById("num2").value);
      const expression = document.getElementById("expression");
      const result = document.getElementById("result");

      if (isNaN(num1) || isNaN(num2)) {
        expression.textContent = "Please enter both numbers";
        result.textContent = "Invalid input";
        return;
      }

      if (num2 === 0) {
        expression.textContent = `${num1} ÷ ${num2}`;
        result.textContent = "Cannot divide by zero";
        return;
      }

      const answer = num1 / num2;
      expression.textContent = `${num1} ÷ ${num2}`;
      result.textContent = answer;
    }
  </script>

</body>
</html>
